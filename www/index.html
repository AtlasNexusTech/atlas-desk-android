<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◆ Atlas Desk v0.7</title>
<style>
:root{--bg:#0a0a0f;--surface:#141423;--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--accent2:#2563eb;--red:#ef4444;--green:#22c55e;--border:rgba(255,255,255,0.06);--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}
.logo{font-weight:800;font-size:15px;white-space:nowrap;background:linear-gradient(135deg,var(--accent),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#topbar input{flex:1;max-width:180px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:13px;text-align:center;outline:none;font-family:monospace}
#topbar input:focus{border-color:var(--accent)}
#topbar button{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:0.15s}
.btn-connect{background:var(--accent);color:#fff}
.btn-connect:hover{background:var(--accent2)}
.btn-disconnect{background:var(--red);color:#fff}
.btn-file{background:rgba(255,255,255,0.06);color:var(--text);font-size:20px;padding:6px 12px;line-height:1}
#status{font-size:12px;color:var(--muted);white-space:nowrap}
#viewport{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;cursor:crosshair}
#canvas{max-width:100%;max-height:100%}
/* Overlay */
.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);z-index:50}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Password dialog */
.dialog{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);z-index:60}
.dialog-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:320px;text-align:center}
.dialog-box h2{font-size:16px;margin-bottom:8px}
.dialog-box p{font-size:13px;color:var(--muted);margin-bottom:16px}
.dialog-box input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:14px;text-align:center;outline:none;margin-bottom:12px}
.dialog-box input:focus{border-color:var(--accent)}
.dialog-box button{width:100%;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff}
.dialog-box .error{color:var(--red);font-size:12px;margin-top:8px;display:none}
/* Stats bar */
#statsBar{position:fixed;bottom:16px;left:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;display:none;z-index:20;font-size:11px;font-family:monospace;color:var(--muted)}
#statsBar span{margin-right:12px}
#statsBar .val{color:var(--text);font-weight:600}

/* File panel */
#filePanel{position:fixed;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;width:260px;display:none;z-index:20}
#filePanel h3{font-size:13px;margin-bottom:8px;color:var(--muted)}
.file-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.file-row .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.file-row .size{color:var(--muted);font-family:monospace}
</style>
</head>
<body>
<div id="topbar">
<span class="logo">◆ Atlas Desk</span>
<input id="agentId" placeholder="PC Bureau or 000 000 000" maxlength="40" autocomplete="off">
<button class="btn-connect" id="connectBtn" onclick="connect()">Connect</button>
<button class="btn-disconnect" id="disconnectBtn" onclick="disconnect()" style="display:none">✕</button>
<button class="btn-file" id="fileBtn" onclick="toggleFiles()" style="display:none" title="File Transfer">📁</button>
<button class="btn-file" id="clipBtn" onclick="pasteToRemote()" style="display:none" title="Paste to Remote">📋</button>
<button class="btn-file" id="settingsBtn" onclick="toggleSettings()" title="Settings">⚙️</button>
<span id="status">Idle</span>
</div>
<div id="viewport"><canvas id="canvas"></canvas><video id="remoteVideo" autoplay playsinline muted style="display:none;max-width:100%;max-height:100%"></video></div>
<!-- Loading overlay -->
<div class="overlay" id="loadingOverlay">
<div style="text-align:center">
<div class="spinner"></div>
<p style="margin-top:12px;color:var(--muted);font-size:13px" id="loadingText">P2P handshake...</p>
</div>
</div>
<!-- Password dialog -->
<div class="dialog" id="passDialog">
<div class="dialog-box">
<h2>🔒 Password Required</h2>
<p>This agent requires a password</p>
<input type="password" id="passInput" placeholder="Enter password" autocomplete="off">
<button onclick="submitPassword()">Connect</button>
<p class="error" id="passError">Wrong password</p>
</div>
</div>
<!-- Settings dialog -->
<div class="dialog" id="settingsDialog">
<div class="dialog-box">
<h2>⚙️ Settings</h2>
<p style="font-size:12px;color:var(--muted);margin-bottom:8px">Signal Server URL</p>
<input type="text" id="signalUrl" placeholder="ws://localhost:8800/ws" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:13px;outline:none;margin-bottom:12px">
<button onclick="saveSettings()" style="width:100%;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff">Save</button>
<button onclick="toggleSettings()" style="width:100%;padding:8px;border-radius:8px;border:none;font-size:12px;cursor:pointer;background:none;color:var(--muted);margin-top:6px">Cancel</button>
</div>
</div>
<!-- Stats bar -->
<div id="statsBar"><span>FPS <span class="val" id="sFPS">0</span></span><span>↓ <span class="val" id="sBW">0</span> KB/s</span><span>Type <span class="val" id="sType">-</span></span></div>

<!-- File panel -->
<div id="filePanel">
<h3>📁 Files</h3>
<div id="fileList" style="max-height:200px;overflow-y:auto;margin-bottom:8px"></div>
<input type="file" id="fileInput" onchange="sendFile()" style="display:none">
<button onclick="document.getElementById('fileInput').click()" style="width:100%;padding:6px;border-radius:6px;border:1px dashed var(--border);background:none;color:var(--muted);cursor:pointer;font-size:12px">+ Send File to Agent</button>
</div>
<script>
// ── State ──
let ws, pc, screenDC, fileDC, clipboardDC, _inputDC;
let myId = 'viewer-' + Date.now().toString(36);
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
const SIGNAL = (() => {
const p = new URLSearchParams(window.location.search);
return p.get('signal') || localStorage.getItem('atlas-desk-signal') || 'ws://localhost:8800/ws';
})();
const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
const remoteFiles = new Map();
let img = new Image();
let reconnectAttempts = 0;
let reconnectTimer = null;
let wasConnected = false;
let savedAgentId = '';
let pendingAgentId = null;
let authToken = null;
let hashedPassword = null;
// ── Connection Stats ──
let statsBytes = 0, statsFrames = 0, statsStart = Date.now(), statsFPS = 0;
let statsUpdateTimer = null;
function updateStats() {
  const elapsed = (Date.now() - statsStart) / 1000;
  statsFPS = elapsed > 0.5 ? Math.round(statsFrames / elapsed) : 0;
  const bw = elapsed > 0.5 ? Math.round(statsBytes / elapsed / 1024) : 0;
  $('sFPS').textContent = statsFPS;
  $('sBW').textContent = bw;
}
function resetStats() {
  statsBytes = 0; statsFrames = 0; statsStart = Date.now();
  if (statsUpdateTimer) clearInterval(statsUpdateTimer);
}

// ── UI ──
function $(id) { return document.getElementById(id); }
function status(s, color) { const el = $('status'); el.textContent = s; if (color) el.style.color = color; }
function overlay(show, text) {
$('loadingOverlay').style.display = show ? 'flex' : 'none';
if (text) $('loadingText').textContent = text;
}
// ── SHA-256 (async, using Web Crypto) ──
async function sha256(str) {
const buf = new TextEncoder().encode(str);
const hash = await crypto.subtle.digest('SHA-256', buf);
return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}
// ── Connect ──
async function connect() {
const agentId = $('agentId').value.replace(/\s/g, '');
if (!agentId && !savedAgentId) return alert('Enter Agent ID');
if (!agentId) $('agentId').value = savedAgentId;
const targetId = agentId || savedAgentId;
pendingAgentId = targetId;
savedAgentId = targetId;
overlay(true, 'Signaling...');
status('Signaling...', 'var(--accent)');
ws = new WebSocket(SIGNAL);
ws.onopen = () => {
ws.send(JSON.stringify({ type: 'register', payload: { id: myId, role: 'client' }, target: agentId }));
status('Awaiting P2P...', 'var(--accent)');
};
ws.onmessage = async (e) => {
const msg = JSON.parse(e.data);
switch (msg.type) {
case 'auth_challenge':
authToken = JSON.parse(msg.payload).token;
$('passDialog').style.display = 'flex';
$('passError').style.display = 'none';
$('passInput').value = '';
$('passInput').focus();
status('🔒 Password required', 'var(--accent)');
break;
case 'auth_failed':
$('passError').textContent = JSON.parse(msg.payload).reason === 'wrong_password' ? 'Wrong password' : 'Auth failed';
$('passError').style.display = 'block';
status('❌ Wrong password', 'var(--red)');
break;
case 'error':
const errReason = JSON.parse(msg.payload || '{}').reason || 'Unknown error';
if (errReason === 'target_not_found') {
status(`❌ Not found: "${JSON.parse(msg.payload).target}"`, 'var(--red)');
overlay(false);
disconnect();
}
break;
case 'offer':
await handleOffer(msg, agentId);
break;
case 'ice_candidate':
if (pc && msg.payload) {
const ice = JSON.parse(msg.payload);
pc.addIceCandidate(new RTCIceCandidate(ice));
}
break;
}
};
ws.onclose = () => { 
if (wasConnected) {
status(`⚠️ Connection lost — reconnecting in 3s...`, 'var(--red)');
reconnectTimer = setTimeout(() => {
if (savedAgentId) {
reconnectAttempts++;
connect();
}
}, 3000);
} else {
status('Disconnected', 'var(--red)'); 
overlay(false); 
}
};
ws.onerror = () => status('Signal error', 'var(--red)');
$('connectBtn').style.display = 'none';
$('disconnectBtn').style.display = '';
}
async function submitPassword() {
const pass = $('passInput').value;
if (!pass) return;
$('passDialog').style.display = 'none';
const pwHash = await sha256(pass);
const proof = await sha256(pwHash + authToken);
ws.send(JSON.stringify({
type: 'auth_response',
target: pendingAgentId,
from: myId,
payload: JSON.stringify({ proof: proof })
}));
overlay(true, 'Authenticating...');
status('Authenticating...', 'var(--accent)');
}
async function handleOffer(msg, agentId) {
pc = new RTCPeerConnection(config);
const inputDC = pc.createDataChannel('input');
_inputDC = inputDC;
inputDC.onopen = () => status('⚡ P2P Ready', 'var(--green)');
pc.ondatachannel = (event) => {
const dc = event.channel;
if (dc.label === 'screen') {
screenDC = dc;
dc.onmessage = handleScreenFrame;
dc.binaryType = 'arraybuffer';
dc.onopen = () => { overlay(false); wasConnected = true; resetStats(); statsUpdateTimer = setInterval(updateStats, 1000); $('statsBar').style.display = ''; status('⚡ Streaming', 'var(--green)'); };
} else if (dc.label === 'files') {
fileDC = dc;
dc.onmessage = handleFileMsg;
dc.onopen = () => { $('fileBtn').style.display = ''; };
} else if (dc.label === 'clipboard') {
clipboardDC = dc;
dc.onmessage = handleClipboardMsg;
dc.onopen = () => { $('clipBtn').style.display = ''; };
}
};
  // H.264 video track (primary streaming path) — v0.8
  pc.ontrack = (event) => {
    const stream = event.streams[0];
    if (!stream) return;
    const rv = document.getElementById('remoteVideo');
    rv.srcObject = stream;
    canvas.style.display = "none";
    rv.style.display = "";
    rv.onloadedmetadata = () => {
      rv.play().catch(() => {});
      overlay(false);
      wasConnected = true;
      resetStats();
      statsUpdateTimer = setInterval(updateStats, 1000);
      document.getElementById('statsBar').style.display = '';
      status('🎥 H.264 Streaming', 'var(--green)');
    };
  };
pc.onicecandidate = (e) => {
if (e.candidate) {
ws.send(JSON.stringify({
type: 'ice_candidate', target: agentId,
payload: JSON.stringify({ candidate: e.candidate.candidate, sdpMid: e.candidate.sdpMid })
}));
}
};
const offer = JSON.parse(msg.payload);
await pc.setRemoteDescription(new RTCSessionDescription(offer));
const answer = await pc.createAnswer();
await pc.setLocalDescription(answer);
ws.send(JSON.stringify({
type: 'answer', target: agentId,
payload: JSON.stringify({ sdp: answer.sdp, type: 'answer' })
}));
status('Handshake...', 'var(--accent)');
}
// ── Screen Frame (v1: full + diff encoding) ──
function handleScreenFrame(event) {
if (!(event.data instanceof ArrayBuffer)) return;
const data = new Uint8Array(event.data);
const view = new DataView(data.buffer);
let offset = 0;
if (offset >= data.length) return;
const frameType = data[offset]; offset += 1;
if (offset + 4 > data.length) return;
const metaLen = view.getUint32(offset); offset += 4;
if (offset + metaLen > data.length) return;
const metaJSON = new TextDecoder().decode(data.slice(offset, offset + metaLen));
const meta = JSON.parse(metaJSON);
offset += metaLen;
if (frameType === 0x00) {
// Full frame
if (offset + 4 > data.length) return;
const jpgLen = view.getUint32(offset); offset += 4;
if (offset + jpgLen > data.length) return;
const jpgData = data.slice(offset, offset + jpgLen);
const blob = new Blob([jpgData], { type: 'image/jpeg' });
const url = URL.createObjectURL(blob);
img.onload = () => {
canvas.width = meta.w;
canvas.height = meta.h;
ctx.drawImage(img, 0, 0);
URL.revokeObjectURL(url);
};
img.src = url;
} else if (frameType === 0x01) {
// Diff frame — composite blocks
if (offset + 2 > data.length) return;
const numBlocks = view.getUint16(offset); offset += 2;
if (numBlocks === 0) return;
if (canvas.width !== meta.w || canvas.height !== meta.h) {
canvas.width = meta.w; canvas.height = meta.h;
}
for (let i = 0; i < numBlocks; i++) {
if (offset + 10 > data.length) break;
const bx = view.getUint16(offset); offset += 2;
const by = view.getUint16(offset); offset += 2;
const bw = view.getUint16(offset); offset += 2;
const bh = view.getUint16(offset); offset += 2;
const blen = view.getUint32(offset); offset += 4;
if (offset + blen > data.length) break;
const bdata = data.slice(offset, offset + blen);
offset += blen;
const bUrl = URL.createObjectURL(new Blob([bdata], { type: 'image/jpeg' }));
const bi = new Image();
bi.onload = (function(x,y,w,h,u) { return function() { ctx.drawImage(this, x, y, w, h); URL.revokeObjectURL(u); }; })(bx, by, bw, bh, bUrl);
bi.src = bUrl;
}
}
if (meta.f % 150 === 0) {
const kb = (event.data.byteLength / 1024).toFixed(1);
const type = frameType === 0x00 ? 'FULL' : 'DIFF';
statsFrames++;
    statsBytes += event.data.byteLength;
    $('sType').textContent = type;
    status(`⚡ ${meta.w}x${meta.h} ${type} ~${kb}KB`, 'var(--green)');
}
}
// ── File Transfer ──
function toggleFiles() {
$('filePanel').style.display = $('filePanel').style.display === 'none' ? 'block' : 'none';
}
function sendFile() {
const input = $('fileInput');
const file = input.files[0];
if (!file || !fileDC || fileDC.readyState !== 'open') return;
const fileId = crypto.randomUUID();
fileDC.send(JSON.stringify({ type: 'file_start', name: file.name, size: file.size, id: fileId }));
addFileEntry(file.name, file.size, 'sending...');
const CHUNK = 16 * 1024;
let offset = 0;
const reader = new FileReader();
reader.onload = () => {
const chunk = new Uint8Array(reader.result);
const meta = JSON.stringify({ type: 'file_chunk', id: fileId, offset: offset });
const metaBytes = new TextEncoder().encode(meta);
const pkt = new Uint8Array(4 + metaBytes.length + chunk.length);
new DataView(pkt.buffer).setUint32(0, metaBytes.length);
pkt.set(metaBytes, 4);
pkt.set(chunk, 4 + metaBytes.length);
fileDC.send(pkt.buffer);
offset += chunk.length;
if (offset < file.size) readChunk();
else {
fileDC.send(JSON.stringify({ type: 'file_end', id: fileId, name: file.name }));
addFileEntry(file.name, file.size, 'sent ✅');
status(`✅ Sent: ${file.name}`, 'var(--green)');
}
};
function readChunk() { reader.readAsArrayBuffer(file.slice(offset, offset + CHUNK)); }
readChunk();
input.value = '';
}
function handleFileMsg(event) {
if (typeof event.data === 'string') {
const msg = JSON.parse(event.data);
if (msg.type === 'file_end') addFileEntry(msg.name, 0, 'received ✅');
return;
}
}
function addFileEntry(name, size, st) {
remoteFiles.set(name, { size, status: st });
const list = $('fileList');
list.innerHTML = '';
for (const [n, i] of remoteFiles) {
list.innerHTML += `<div class="file-row"><span class="name" title="${n}">${n}</span><span class="size">${i.size?(i.size/1024).toFixed(1)+' KB':''} ${i.status}</span></div>`;
}
}
// ── Input ──
canvas.addEventListener('mousemove', (e) => {
if (!_inputDC || _inputDC.readyState !== 'open') return;
const rect = canvas.getBoundingClientRect();
_inputDC.send(JSON.stringify({
action: 'mouse_move',
x: Math.round((e.clientX - rect.left) * canvas.width / rect.width),
y: Math.round((e.clientY - rect.top) * canvas.height / rect.height)
}));
});
canvas.addEventListener('click', () => { if (_inputDC && _inputDC.readyState==='open') _inputDC.send(JSON.stringify({action:'mouse_click',button:'left'})); });
canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); if (_inputDC && _inputDC.readyState==='open') _inputDC.send(JSON.stringify({action:'mouse_click',button:'right'})); });
canvas.addEventListener('wheel', (e) => { e.preventDefault(); if (_inputDC && _inputDC.readyState==='open') _inputDC.send(JSON.stringify({action:'scroll',dy:e.deltaY>0?1:-1})); });
document.addEventListener('keydown', (e) => { if (!_inputDC || _inputDC.readyState!=='open' || e.target.tagName==='INPUT') return; e.preventDefault(); _inputDC.send(JSON.stringify({action:'key',key:e.key})); });
// ── Clipboard Sync ──
function handleClipboardMsg(event) {
const msg = JSON.parse(event.data);
if (msg.type === 'clipboard' && msg.text) {
navigator.clipboard.writeText(msg.text).then(() => {
status(`📋 Copied: ${msg.text.substring(0, 40)}...`, 'var(--accent)');
setTimeout(() => status('⚡ Streaming', 'var(--green)'), 2000);
}).catch(() => {});
}
}
async function pasteToRemote() {
if (!clipboardDC || clipboardDC.readyState !== 'open') return;
try {
const text = await navigator.clipboard.readText();
if (text) {
clipboardDC.send(JSON.stringify({ type: 'clipboard', text: text }));
status(`📋 Pasted to remote: ${text.substring(0, 30)}...`, 'var(--accent)');
setTimeout(() => status('⚡ Streaming', 'var(--green)'), 1500);
}
} catch(e) {
status('⚠️ Clipboard access denied — click the page first', 'var(--red)');
}
}
// ── Settings ──
function toggleSettings() {
const d = $('settingsDialog');
if (d.style.display === 'flex') {
d.style.display = 'none';
} else {
$('signalUrl').value = localStorage.getItem('atlas-desk-signal') || 'ws://localhost:8800/ws';
d.style.display = 'flex';
}
}
function saveSettings() {
const url = $('signalUrl').value.trim();
if (url) {
localStorage.setItem('atlas-desk-signal', url);
status('✅ Settings saved — reload page to apply', 'var(--green)');
}
$('settingsDialog').style.display = 'none';
}
// ── Disconnect ──
function disconnect() {
if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
wasConnected = false;
savedAgentId = '';
if (_inputDC) _inputDC.close();
if (screenDC) screenDC.close();
if (fileDC) fileDC.close();
if (clipboardDC) clipboardDC.close();
if (pc) pc.close();
if (ws) ws.close();
_inputDC = screenDC = fileDC = clipboardDC = pc = ws = null;
img = new Image();
ctx.clearRect(0, 0, canvas.width, canvas.height);
$('connectBtn').style.display = '';
$('disconnectBtn').style.display = 'none';
$('fileBtn').style.display = 'none';
$('clipBtn').style.display = 'none';
$('filePanel').style.display = 'none';
$('passDialog').style.display = 'none';
remoteFiles.clear();
renderFileList();
if (statsUpdateTimer) clearInterval(statsUpdateTimer);
  $('statsBar').style.display = 'none';
  status('Idle');
}
function renderFileList() { $('fileList').innerHTML = ''; }
</script>
</body>
</html>
